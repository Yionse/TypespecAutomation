trigger:
  - master

pool:
  vmImage: windows-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.18.3"
    displayName: "Install Node.js"

  - script: |
      echo "Installing Yarn globally..."
      npm i -g yarn
    displayName: "Install Yarn"

  - script: |
      echo "Clearing cache and reinstalling dependencies..."
      yarn cache clean
      yarn install --force
    displayName: "Force install dependencies"

  - script: |
      echo "Running tests..."
      yarn test || echo "Test command failed!"
    displayName: "Run tests with logging"
