trigger:
  - master

pool:
  vmImage: windows-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.18.3"
    displayName: "Install Node.js"

  - script: |
      echo "Installing Yarn globally..."
      npm i
    displayName: "Install Dependencies"

  - script: |
      echo "Running tests..."
      npm run test || echo "Test command failed!"
    displayName: "Run tests with logging"
